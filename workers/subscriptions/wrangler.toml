name = "sovetydoma-subscriptions"
main = "src/index.ts"
compatibility_date = "2026-06-02"

[vars]
ALLOWED_ORIGINS = "https://1001sovet.ru,http://localhost:3000,http://127.0.0.1:3000"
SUBSCRIPTIONS_API_URL = "https://sovetydoma-subscriptions.filippmiller.workers.dev"
PUBLIC_SITE_URL = "https://1001sovet.ru"
VK_ID_APP_ID = "54626241"
VK_ID_REDIRECT_URI = "https://1001sovet.ru/api/auth/vk/callback"
VK_GROUP_ID = "239393062"
VK_API_VERSION = "5.199"
MAX_API_BASE_URL = "https://platform-api.max.ru/"
TURNSTILE_SITEVERIFY_URL = "https://challenges.cloudflare.com/turnstile/v0/siteverify"
# SUBSCRIPTIONS_ALLOW_UNVERIFIED_TURNSTILE: dev-only Turnstile bypass. Never commit
# it here — a plain `wrangler deploy` would then ship the bypass to production.
# For local testing put `SUBSCRIPTIONS_ALLOW_UNVERIFIED_TURNSTILE = "true"` in an
# (uncommitted) workers/subscriptions/.dev.vars file. In production, set the real
# TURNSTILE_SECRET_KEY secret instead; with neither set, /subscriptions/start
# denies by default.
# VK_AUTOPOST_MAX_DAILY: optional daily cap for automatic VK wall posts.
# Default is 3. Set via wrangler secret or .dev.vars if you want to override.

[triggers]
crons = ["0 * * * *"]
