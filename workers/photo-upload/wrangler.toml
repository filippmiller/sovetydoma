name = "sovetydoma-photo-upload"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "sovetydoma-photos"

# ─────────────────────────────────────────────────────────────────────────────
# KV namespace for persistent contact-form rate limiting (cross-PoP / cross-
# isolate).  Before deploying, run:
#
#   npx wrangler kv namespace create RATE_LIMIT_KV
#
# Copy the printed `id` value and paste it below in place of
# "REPLACE_WITH_REAL_KV_NAMESPACE_ID".
# ─────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "c8ca9c98bcc34fce936764aa02a39d83"

[vars]
SUPABASE_URL = "https://api.1001sovet.ru"
ALLOWED_ORIGIN = "*"
CONTACT_ALLOWED_ORIGINS = "https://1001sovet.ru,http://127.0.0.1:4177,http://localhost:4177"
VIEW_ALLOWED_ORIGINS = "https://1001sovet.ru,http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1:4177,http://localhost:4177"
CONTACT_TO_EMAIL = "alexmiller.idothings@gmail.com"
CONTACT_FROM_EMAIL = "noreply@vsedomatut.com"

[[send_email]]
name = "EMAIL"
destination_address = "alexmiller.idothings@gmail.com"
