name: Deploy to Timeweb VPS

# Build the static export. Production deploy is pulled by the Timeweb VPS timer:
# 1001sovet-pull-deploy.timer fetches master, builds on the VPS, then runs
# /opt/deploy/activate.sh for an atomic symlink swap.
on:
  push:
    branches: [master, main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://1001sovet.ru
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_PHOTO_WORKER_URL: ${{ secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
      NEXT_PUBLIC_CONTACT_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CONTACT_WORKER_URL || secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
      NEXT_PUBLIC_SUBSCRIPTIONS_API_URL: ${{ secrets.NEXT_PUBLIC_SUBSCRIPTIONS_API_URL }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Tests and content audits
        run: |
          pnpm test
          pnpm run audit:images

      - name: Build static export
        run: pnpm run build

      - name: Sanity check output
        run: |
          test -f out/index.html || { echo "::error::out/index.html missing - build did not export"; exit 1; }
          echo "Exported $(find out -type f | wc -l) files"

      - name: Confirm VPS pull deploy model
        run: |
          set -euo pipefail
          echo "Build is valid for $GITHUB_SHA."
          echo "The Timeweb VPS pulls master with 1001sovet-pull-deploy.timer and activates the release."
          echo "Live verification is performed from an operator machine because GitHub-hosted runners currently cannot reliably reach the VPS over inbound IPv4."
