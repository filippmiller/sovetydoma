name: Deploy to Timeweb VPS

# Build the static export and ship it to the Timeweb VPS over SSH.
# Atomic release: upload to a timestamped dir, then symlink-swap via activate.sh.
on:
  push:
    branches: [master, main]
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never interrupt an in-flight deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://1001sovet.ru
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_PHOTO_WORKER_URL: ${{ secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
      NEXT_PUBLIC_CONTACT_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CONTACT_WORKER_URL || secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Tests and content audits
        run: |
          pnpm test
          pnpm run audit:images

      - name: Build static export
        run: pnpm run build

      - name: Sanity check output
        run: |
          test -f out/index.html || { echo "::error::out/index.html missing — build did not export"; exit 1; }
          echo "Exported $(find out -type f | wc -l) files"

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install SSH deploy key
        run: |
          install -m 600 /dev/stdin ~/.ssh/deploy_key <<< "${{ secrets.VPS_SSH_KEY }}"

      - name: Upload release (rsync)
        run: |
          REL="gha-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "REL=$REL" >> $GITHUB_ENV
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/1001sovet-releases/$REL/

      - name: Activate release (atomic symlink swap)
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "/opt/deploy/activate.sh '$REL'"

      - name: Smoke test (live host)
        run: |
          set -euo pipefail
          # Hit the real HTTPS site; -L follows the HTTP->HTTPS 301.
          code=$(curl -sL -o /tmp/home.html -w "%{http_code}" --max-time 25 https://1001sovet.ru/)
          echo "Homepage returned $code"
          [ "$code" = "200" ] || { echo "::error::Homepage smoke failed ($code)"; exit 1; }
          grep -q "СоветыДома" /tmp/home.html || { echo "::error::Homepage content marker missing"; exit 1; }

          redirect=$(curl -sI --max-time 25 http://1001sovet.ru/ | tr -d '\r' | awk 'tolower($1)=="location:" {print $2}' | tail -1)
          [ "$redirect" = "https://1001sovet.ru/" ] || { echo "::error::HTTP redirect mismatch: $redirect"; exit 1; }

          curl -fsSL --max-time 25 https://1001sovet.ru/dacha-i-ogorod/borba-s-oduvanchikami/ | grep -q "одуванчиков" \
            || { echo "::error::Article page smoke failed"; exit 1; }
          curl -fsSI --max-time 25 https://1001sovet.ru/images/previews/borba-s-oduvanchikami.jpg >/dev/null \
            || { echo "::error::Article preview image smoke failed"; exit 1; }
          curl -fsSL --max-time 25 https://1001sovet.ru/sitemap.xml | grep -q "borba-s-oduvanchikami" \
            || { echo "::error::Sitemap smoke failed"; exit 1; }
          curl -fsSL --max-time 25 https://1001sovet.ru/feed.xml | grep -q "СоветыДома" \
            || { echo "::error::RSS smoke failed"; exit 1; }
          curl -fsSL --max-time 25 https://1001sovet.ru/build.json | grep -q "$GITHUB_SHA" \
            || { echo "::error::Live build metadata does not match $GITHUB_SHA"; exit 1; }

      - name: Cleanup key
        if: always()
        run: rm -f ~/.ssh/deploy_key
