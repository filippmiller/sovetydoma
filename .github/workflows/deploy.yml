name: Build & publish static site to dist

# POLICY: this full rebuild is for CODE / TEMPLATE / DESIGN changes ONLY.
# Publishing an ARTICLE must NOT rebuild — routine content goes live via the
# dynamic renderer (DB -> Cloudflare worker -> Caddy fallback). See
# docs/NO-REDEPLOY-PUBLISHING.md and bead sovetydoma-289. The tar-all-of-out/
# webhook below 413s once the corpus grows; that's a symptom of using rebuild
# for content. Do not "fix" it by re-uploading the whole site per article.
#
# New deploy model (2026-06-04 incident fix): the VPS NEVER builds.
# GitHub Actions builds the static export and publishes it to the `dist` branch.
# The VPS pulls the PREBUILT `dist` and atomically swaps the symlink (no pnpm/next build on prod).
on:
  push:
    branches: [master, main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: write   # needed to push the dist branch

jobs:
  build-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SITE_URL: https://1001sovet.ru
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_PHOTO_WORKER_URL: ${{ secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
      NEXT_PUBLIC_CONTACT_WORKER_URL: ${{ secrets.NEXT_PUBLIC_CONTACT_WORKER_URL || secrets.NEXT_PUBLIC_PHOTO_WORKER_URL }}
      NEXT_PUBLIC_SUBSCRIPTIONS_API_URL: ${{ secrets.NEXT_PUBLIC_SUBSCRIPTIONS_API_URL }}
      NEXT_PUBLIC_VK_AUTH_ENABLED: ${{ secrets.NEXT_PUBLIC_VK_AUTH_ENABLED || 'false' }}
      NEXT_PUBLIC_VK_APP_ID: ${{ secrets.NEXT_PUBLIC_VK_APP_ID || '54625895' }}
      NEXT_PUBLIC_VK_SCOPE: ${{ secrets.NEXT_PUBLIC_VK_SCOPE || 'email' }}
      NEXT_PUBLIC_YANDEX_OAUTH_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_OAUTH_CLIENT_ID }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
      NEXT_PUBLIC_YM_ID: '109804586'
      YANDEX_OAUTH_CLIENT_ID: ${{ secrets.YANDEX_OAUTH_CLIENT_ID }}
      YANDEX_OAUTH_CLIENT_SECRET: ${{ secrets.YANDEX_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Tests and content audits
        run: |
          pnpm test
          pnpm run audit:images

      - name: Build static export
        run: pnpm run build

      - name: Sanity check output
        run: |
          test -f out/index.html || { echo "::error::out/index.html missing - build did not export"; exit 1; }
          echo "Exported $(find out -type f | wc -l) files"

      - name: Stamp build.json
        run: |
          node -e "require('fs').writeFileSync('out/build.json', JSON.stringify({sha: process.env.GITHUB_SHA, ref: process.env.GITHUB_REF_NAME, built_at: new Date().toISOString()}))"
          cat out/build.json

      - name: Publish prebuilt site to dist branch
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch dist
          rm -rf /tmp/dist && mkdir -p /tmp/dist
          cp -a out/. /tmp/dist/
          touch /tmp/dist/.nojekyll
          cd /tmp/dist
          git init -q
          git checkout -q -b dist
          git add -A
          git commit -q -m "build ${GITHUB_SHA} ($(date -u +%FT%TZ))"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" dist
          echo "Published dist for ${GITHUB_SHA}"

      - name: Verify production activation (pulled by VPS timer)
        # The VPS runs `1001sovet-pull-deploy.timer` every minute, which pulls the
        # freshly-published `dist` branch and atomically activates it (healthcheck +
        # rollback). No tarball upload — the old /__deploy/upload webhook 413'd on the
        # full out/ payload. This step just polls until production reports our SHA.
        # Non-fatal: a slow timer tick should not mark the build red.
        run: |
          set -uo pipefail
          for i in $(seq 1 20); do
            LIVE=$(curl -s --max-time 10 https://1001sovet.ru/build.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            if [ "$LIVE" = "${GITHUB_SHA}" ]; then
              echo "Production active on ${GITHUB_SHA}"
              exit 0
            fi
            echo "waiting for VPS pull-deploy timer ($i/20)… live=${LIVE:-none}"
            sleep 15
          done
          echo "::warning::Production not yet on ${GITHUB_SHA} after ~5min; VPS timer will catch up. Check 1001sovet-pull-deploy.timer on the host."
