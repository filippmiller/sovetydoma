name: Content factory (every 5h — 1 article, rotating category)

# Cadence: every 5 hours, generate ONE article in ONE category (rotating through
# all categories over time), Claude text + fal.ai photo, publish live with no
# rebuild (DB+R2). The subscriptions worker's hourly cron then autoposts it to
# that category's VK/FB groups (with its own daily caps), with a photo.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY              — Claude text generation
#   FAL_KEY                        — fal.ai image generation
#   MATRIX_SUPABASE_URL            — RU Supabase REST URL (https://api.1001sovet.ru)
#   MATRIX_SUPABASE_SERVICE_ROLE_KEY
#   R2_UPLOAD_SECRET               — shared secret for the renderer /__r2 upload endpoint
#
# Manual run: Actions → this workflow → Run workflow (dry_run toggles cost).

on:
  schedule:
    - cron: '0 */5 * * *'   # every 5 hours — 1 article in one rotating category
  workflow_dispatch:
    inputs:
      categories:
        description: 'Comma categories, "all", or "auto" (rotate one)'
        required: false
        default: 'auto'
      dry_run:
        description: 'Dry run (no API cost / no writes)'
        required: false
        default: 'false'

concurrency:
  group: content-factory
  cancel-in-progress: false

jobs:
  factory:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Egress relay (Anthropic geo-blocks some IPs). Host is non-secret; token is.
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || 'https://anthropic.vsedomatut.com' }}
      ANTHROPIC_RELAY_TOKEN: ${{ secrets.ANTHROPIC_RELAY_TOKEN }}
      FAL_KEY: ${{ secrets.FAL_KEY }}
      SUPABASE_URL: ${{ secrets.MATRIX_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MATRIX_SUPABASE_SERVICE_ROLE_KEY }}
      # Images upload through the renderer worker's /__r2 endpoint (no CF API token).
      R2_UPLOAD_SECRET: ${{ secrets.R2_UPLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: '24', cache: 'pnpm' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pnpm install --frozen-lockfile
      - run: pip install pillow

      - name: Generate (1 article, rotating category)
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then DRY=--dry-run; else DRY=; fi
          SEL="${{ github.event.inputs.categories }}"
          CATS=(kulinaria dom-i-uborka dacha-i-ogorod layfkhaki ekonomiya rybalka zdorovie-i-bezopasnost semya-i-deti krasota-i-uhod otdyh-i-puteshestviya pokupki-i-tehnika avto)
          if [ -z "$SEL" ] || [ "$SEL" = "auto" ]; then
            # Rotate one category every 5h (epoch / 18000 mod 12) — covers all over ~60h.
            IDX=$(( ($(date +%s) / 18000) % ${#CATS[@]} ))
            CAT=${CATS[$IDX]}
            echo "Rotating category -> $CAT"
            node scripts/factory/generate-article.mjs --category "$CAT" $DRY
          elif [ "$SEL" = "all" ]; then
            node scripts/factory/generate-article.mjs --all $DRY
          else
            for c in $(echo "$SEL" | tr ',' ' '); do
              node scripts/factory/generate-article.mjs --category "$c" $DRY || true
            done
          fi

      - name: Publish live (no rebuild — DB + R2)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: node scripts/matrix/publish-dynamic.mjs --limit 3
