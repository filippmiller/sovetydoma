name: Auto-publish matrix articles

# No-redeploy backlog drainer (MANUAL only). Publishes approved+image-ready rows
# from the content_matrix LIVE via the renderer worker (DB row + R2 image upload),
# exactly like content-factory.yml's publish step — NO MDX export, NO git
# commit/push, NO site rebuild. Honours the no-redeploy mandate (epic 289).
#
# The two scheduled drops (07:00/14:00 UTC) were removed (2026-06-19, bead i1k):
# the old cron ran scripts/matrix/auto-publish.mjs, which wrote MDX, committed it
# and pushed via CONTENT_PUBLISH_PAT to trigger deploy.yml's full rebuild — it
# competed with content-factory.yml for the same approved rows and forced a
# ~20-min rebuild of the whole site. Fresh articles are now published with no
# rebuild by content-factory.yml; this workflow remains only as a MANUAL drainer
# for any leftover approved backlog.
#
# Caveat: publish-dynamic.mjs uploads the image from public/images/<image_filename>
# in the checkout (it does NOT generate images). So a dispatch run can only publish
# rows whose image file is committed to the repo. Rows generated by content-factory
# are already published by that workflow.
#
# Image generation (fal.ai/Grok) is NOT done here.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max articles to publish this run'
        required: false
        default: '2'
      dry_run:
        description: 'Dry run (no DB/R2 writes)'
        required: false
        default: 'false'

concurrency:
  group: content-autopublish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.MATRIX_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MATRIX_SUPABASE_SERVICE_ROLE_KEY }}
      # Images upload through the renderer worker's /__r2 endpoint (no CF API token).
      R2_UPLOAD_SECRET: ${{ secrets.R2_UPLOAD_SECRET }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Python (card-preview generation)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow
        run: pip install Pillow

      - name: Publish ready matrix rows (no rebuild — DB + R2)
        run: |
          LIMIT="${{ github.event.inputs.limit || '2' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node scripts/matrix/publish-dynamic.mjs --limit "$LIMIT" --dry-run
          else
            node scripts/matrix/publish-dynamic.mjs --limit "$LIMIT"
          fi
