<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>VK ID | СоветыДома</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #faf8f4; color: #222; }
      main { max-width: 520px; margin: 12vh auto; padding: 24px; text-align: center; }
      h1 { font-size: 24px; margin: 0 0 12px; }
      p { color: #555; line-height: 1.5; }
      a { color: #c0392b; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>VK ID</h1>
      <p id="status">Завершаем вход через VK ID...</p>
      <p><a href="/">Вернуться на главную</a></p>
    </main>
    <script>
      (async function () {
        var status = document.getElementById('status');
        var codeVerifierKey = 'sovetydoma_vk_id_code_verifier';
        var stateKey = 'sovetydoma_vk_oauth_state';
        var apiBase = 'https://sovetydoma-subscriptions.filippmiller.workers.dev';
        // Open-redirect guard: accept only the two known public origins for the
        // same Supabase deployment (the self-hosted auth endpoint and its
        // legacy project URL), and only the /auth/v1/ path.
        var allowedActionLinkOrigins = [
          'https://api.1001sovet.ru',
          'https://plwkjdpuxjkmpkqiqzkk.supabase.co'
        ];
        function isExpectedActionLink(value) {
          try {
            var target = new URL(String(value));
            return allowedActionLinkOrigins.indexOf(target.origin) !== -1
              && target.pathname.indexOf('/auth/v1/') === 0;
          } catch (_) {
            return false;
          }
        }
        try {
          var params = new URLSearchParams(window.location.search);
          var error = params.get('error') || '';
          var code = params.get('code') || '';
          var deviceId = params.get('device_id') || params.get('deviceId') || '';
          var returnedState = params.get('state') || '';
          var codeVerifier = window.sessionStorage.getItem(codeVerifierKey) || '';
          var storedState = window.sessionStorage.getItem(stateKey) || '';
          if (error) throw new Error(error);

          // CSRF: the returned state must match the one we generated when the
          // user clicked "Продолжить с VK ID". The stored value is one-time.
          window.sessionStorage.removeItem(stateKey);
          if (!storedState || !returnedState || returnedState !== storedState) {
            throw new Error('state_mismatch');
          }

          if (!code || !deviceId || !codeVerifier) throw new Error('missing_callback_payload');

          var res = await fetch(apiBase + '/auth/vk/exchange', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              code: code,
              device_id: deviceId,
              code_verifier: codeVerifier,
              state: returnedState
            })
          });
          var body = await res.json().catch(function () { return {}; });
          if (!res.ok || !body.ok || !body.actionLink) {
            throw new Error(body.message || body.error || 'vk_exchange_failed');
          }
          if (!isExpectedActionLink(body.actionLink)) {
            throw new Error('vk_invalid_action_link');
          }

          window.sessionStorage.removeItem(codeVerifierKey);
          window.location.replace(body.actionLink);
        } catch (err) {
          console.error('[vk-auth-callback]', err);
          status.textContent = err && err.message === 'state_mismatch'
            ? 'Проверка безопасности входа не пройдена. Вернитесь на сайт и попробуйте войти ещё раз.'
            : 'Не удалось войти через VK ID. Вернитесь на сайт и попробуйте еще раз.';
        }
      })();
    </script>
  </body>
</html>
