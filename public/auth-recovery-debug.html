<!DOCTYPE html>

<style>body{font:14px/1.5 monospace;padding:1rem;max-width:900px;margin:auto}pre{background:#111;color:#0f0;padding:1rem;border-radius:8px;white-space:pre-wrap;word-break:break-all}</style>
</head>
<body>
<h1>Auth recovery diagnostic (redacted)</h1>
<p>Isolated page (no app shell). Loads the EXACT bundled @supabase/supabase-js@2.106.2 UMD from same origin. Tokens never printed.</p>
<pre id="out">loading supabase…</pre>
<script src="/vendor-supabase-2106.js"></script>
<script>
(function(){
  var URL_='https://api.1001sovet.ru'
  var ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlIiwiaWF0IjoxNzgxMDAwMDAwLCJleHAiOjIwOTYzNjAwMDB9.reN2LvNIuuf9y0P7w_nWvI1hoKhvNMiwSqBMfelzKaI'
  var out=document.getElementById('out')
  var show=function(o){out.textContent=JSON.stringify(o,null,2)}
  if(!window.supabase||!window.supabase.createClient){show({fatal:'supabase UMD not loaded'});return}

  var hash=new URLSearchParams(location.hash.slice(1))
  var access_token=hash.get('access_token')
  var refresh_token=hash.get('refresh_token')
  var email=null; try{email=JSON.parse(atob((access_token||'').split('.')[1])).email}catch(e){}
  var result={hashType:hash.get('type'),email:email,hasTokens:!!(access_token&&refresh_token),sw:{controlled:!!(navigator.serviceWorker&&navigator.serviceWorker.controller)},clients:{}}

  function makeFetch(force,logArr){
    return function(input,init){
      var req=(typeof input==='object'&&input.url)?input:null
      var url=req?req.url:String(input)
      var method=(init&&init.method)||(req&&req.method)||'GET'
      var entry={url:url.replace(URL_,''),method:method,credReq:req?req.credentials:undefined,credInit:init?init.credentials:undefined,mode:req?req.mode:(init?init.mode:undefined),forced:force?'omit':null}
      var eff=force?Object.assign({},init,{credentials:'omit'}):init
      return fetch(input,eff).then(function(res){entry.status=res.status;logArr.push(entry);return res}).catch(function(e){entry.error=String(e);logArr.push(entry);throw e})
    }
  }
  function runClient(force){
    var logArr=[]
    var sb=window.supabase.createClient(URL_,ANON,{global:{fetch:makeFetch(force,logArr)},auth:{persistSession:false,detectSessionInUrl:false,autoRefreshToken:false}})
    var r={requests:logArr,steps:{}}
    var p=Promise.resolve()
    if(access_token&&refresh_token){
      p=p.then(function(){return sb.auth.setSession({access_token:access_token,refresh_token:refresh_token})}).then(function(ss){r.steps.setSession={ok:!ss.error,err:ss.error&&ss.error.message,hasSession:!!(ss.data&&ss.data.session),email:ss.data&&ss.data.user&&ss.data.user.email}})
    }
    p=p.then(function(){return sb.auth.getUser()}).then(function(gu){r.steps.getUser={ok:!gu.error,err:gu.error&&gu.error.message,email:gu.data&&gu.data.user&&gu.data.user.email}}).catch(function(e){r.fatal=String(e)})
    return p.then(function(){return r})
  }

  runClient(true).then(function(omit){
    result.clients.omit=omit
    return runClient(false)
  }).then(function(def){
    result.clients.default=def
    // raw matrix
    var modes=['omit','same-origin','include'];var rm={}
    return modes.reduce(function(acc,m){return acc.then(function(){return fetch(URL_+'/auth/v1/user',{credentials:m,headers:{apikey:ANON,Authorization:'Bearer '+(access_token||'x')}}).then(function(res){rm[m]=res.status}).catch(function(e){rm[m]='ERR'})})},Promise.resolve()).then(function(){result.rawMatrix=rm;show(result)})
  }).catch(function(e){result.fatal=String(e);show(result)})
})()
</script>
</body>
</html>
